<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FGC 2026 · Volunteer Operations · Incheon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8eaef; --bg-2:#eef0f4;
  --surface:#ffffff; --surface-2:#f5f6f9; --surface-3:#eef0f4;
  --line:#e2e5ec; --line-2:#d2d7e0;
  --ink:#181c24; --text:#1d232c; --text-2:#5a6473; --text-3:#8b94a3;
  --accent:#3b4655; --accent-deep:#2b3340; --accent-tint:#eceef2; --accent-line:#dde0e7; --accent-soft:#f4f5f8;
  --hot:#c2563a; --hot-tint:#f8ece7; --blue:#2a64ab; --red:#bb3b3b;
  --ok:#3f7d57; --ok-tint:#e9f1ec; --warn:#b07d2b; --warn-tint:#f6efe0;
  --bad:#a4413f; --bad-tint:#f6e9e8; --info:#3f6695; --info-tint:#e9eff6;
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
  --shadow-1:0 1px 2px rgba(20,24,31,.05), 0 1px 1px rgba(20,24,31,.04);
  --shadow-2:0 2px 4px rgba(20,24,31,.04), 0 10px 26px -14px rgba(20,24,31,.22);
  --shadow-3:0 30px 60px -28px rgba(20,24,31,.40), 0 8px 24px -16px rgba(20,24,31,.30);
  --rail-w:248px;
  --font:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --display:'Space Grotesk','Inter',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}
#app[data-station="dashboard"]  {--accent:#3b4655;--accent-deep:#2b3340;--accent-tint:#ededf1;--accent-line:#dde0e7}
#app[data-station="inspections"]{--accent:#21406a;--accent-deep:#173052;--accent-tint:#e9eef6;--accent-line:#d4ddec}
#app[data-station="emergency"]  {--accent:#21406a;--accent-deep:#173052;--accent-tint:#e9eef6;--accent-line:#d4ddec}
#app[data-station="hospital"]   {--accent:#2c6e6a;--accent-deep:#225753;--accent-tint:#e6f0ef;--accent-line:#cfe3e1}
#app[data-station="spares"]     {--accent:#5b5378;--accent-deep:#463f5c;--accent-tint:#eceaf0;--accent-line:#dcd8e4}
#app[data-station="queueing"]   {--accent:#272d37;--accent-deep:#171b22;--accent-tint:#eceef1;--accent-line:#d6dae1}
#app[data-station="judging"]    {--accent:#8d2f33;--accent-deep:#722427;--accent-tint:#f5eaea;--accent-line:#ecd4d4}
html,body{height:100%}
body{font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.45;font-size:14px}
img{display:block;max-width:100%}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}
input,select,textarea{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:#fff}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

#app{display:none;min-height:100dvh}
body.authed #app{display:flex}
body.authed #login{display:none}
#login{display:flex}

.rail{width:var(--rail-w);flex:0 0 var(--rail-w);background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;z-index:30}
.brand{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;border-bottom:1px solid var(--line)}
.brand-mark{width:38px;height:38px;flex:0 0 38px}
.brand-txt .b1{font-family:var(--display);font-weight:700;font-size:14.5px;letter-spacing:-.2px;line-height:1.1}
.brand-txt .b2{font-size:11px;color:var(--text-3);letter-spacing:.3px;margin-top:2px}
.nav{padding:12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
.nav-label{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;color:var(--text-2);font-weight:500;font-size:13.5px;position:relative;transition:background .14s,color .14s}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item .ni-ic{width:19px;height:19px;flex:0 0 19px;color:var(--text-3);transition:color .14s}
.nav-item:hover .ni-ic{color:var(--text-2)}
.nav-item .ni-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;background:var(--dot,transparent);opacity:0;transition:opacity .14s}
.nav-item:hover .ni-dot{opacity:.5}
.nav-item .ni-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--surface-3);padding:1px 7px;border-radius:20px;font-weight:500}
.nav-item.active{background:var(--accent-tint);color:var(--accent-deep)}
.nav-item.active .ni-ic{color:var(--accent)}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav-item.active .ni-dot{opacity:1;background:var(--accent)}
.nav-item.locked{opacity:.5}
.nav-item .ni-lock{margin-left:auto;width:13px;height:13px;color:var(--text-3)}
.rail-foot{border-top:1px solid var(--line);padding:12px;display:flex;align-items:center;gap:6px}
.who{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;flex:1;min-width:0}
.avatar{width:32px;height:32px;flex:0 0 32px;border-radius:50%;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:12.5px;color:#fff;background:var(--accent)}
.who-txt{min-width:0}
.who-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who-role{font-size:11px;color:var(--text-3)}
.signout{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text-3);flex:0 0 34px}
.signout:hover{background:var(--surface-2);color:var(--bad)}
.signout svg{width:17px;height:17px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.cmdbar{position:sticky;top:0;z-index:25;display:flex;align-items:center;gap:14px;padding:12px 22px;background:rgba(255,255,255,.82);backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line)}
.search{position:relative;flex:1;max-width:440px}
.search .s-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-3);pointer-events:none}
.search input{width:100%;height:38px;padding:0 12px 0 36px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);font-size:13.5px;transition:.14s}
.search input::placeholder{color:var(--text-3)}
.search input:focus{outline:none;background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10.5px;color:var(--text-3);border:1px solid var(--line-2);border-radius:6px;padding:1px 6px;font-family:var(--mono)}
.cmd-spacer{flex:1}
.eventclock{display:flex;align-items:center;gap:12px;padding:6px 12px;border:1px solid var(--line);border-radius:11px;background:var(--surface)}
.live-pip{display:flex;align-items:center;gap:7px}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--ok);position:relative}
.dot-live::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1.5px solid var(--ok);opacity:.5;animation:ping 1.8s ease-out infinite}
@keyframes ping{0%{transform:scale(.6);opacity:.6}100%{transform:scale(1.5);opacity:0}}
.ec-live{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--ok)}
.ec-sep{width:1px;height:22px;background:var(--line)}
.ec-day{font-size:11px;color:var(--text-3);line-height:1.2}
.ec-day b{display:block;font-size:12.5px;color:var(--text);font-weight:600}
.ec-clock{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:.5px}
.ec-next{font-size:11px;color:var(--text-3);line-height:1.2;text-align:right}
.ec-next b{display:block;font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--accent-deep)}
.iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;color:var(--text-2);position:relative;transition:.14s}
.iconbtn:hover{background:var(--surface-2);color:var(--text)}
.iconbtn svg{width:18px;height:18px}
.iconbtn .badge-n{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;border-radius:9px;background:var(--hot);color:#fff;font-size:10px;font-weight:600;display:grid;place-items:center;padding:0 4px;font-family:var(--mono);border:2px solid var(--surface)}
.usermenu{position:relative}
.um-btn{display:flex;align-items:center;gap:9px;height:38px;padding:3px 9px 3px 4px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
.um-btn:hover{background:var(--surface-2)}
.um-btn .um-txt{text-align:left;line-height:1.15}
.um-btn .um-name{font-size:12.5px;font-weight:600}
.um-btn .um-role{font-size:10.5px;color:var(--text-3)}
.um-btn .um-chev{width:14px;height:14px;color:var(--text-3)}
.um-pop{position:absolute;top:46px;right:0;width:236px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-3);overflow:hidden;display:none;z-index:50}
.um-pop.on{display:block}
.um-head{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
.um-head .um-h-name{font-size:13.5px;font-weight:600}
.um-head .um-h-role{font-size:11px;color:var(--text-3)}
.um-access{padding:11px 15px;font-size:11.5px;color:var(--text-3);line-height:1.5}
.um-access b{color:var(--text-2);font-weight:600}
.um-row{display:flex;align-items:center;gap:10px;padding:11px 15px;width:100%;font-size:13px;font-weight:600;color:var(--bad);border-top:1px solid var(--line)}
.um-row:hover{background:var(--surface-2)}
.um-row svg{width:16px;height:16px}
.stage{flex:1;padding:26px 28px 64px;max-width:1480px;width:100%;margin:0 auto}
.view{display:none;animation:rise .34s cubic-bezier(.2,.7,.3,1)}
.view.is-active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.phead{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
.eyebrow .eb-dot{width:8px;height:8px;border-radius:2px;background:var(--accent)}
.ptitle{font-family:var(--display);font-weight:600;font-size:27px;letter-spacing:-.5px;line-height:1.05}
.psub{color:var(--text-2);font-size:13.5px;margin-top:7px;max-width:62ch}
.kpis{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 15px;min-width:108px;box-shadow:var(--shadow-1)}
.kpi .k-n{font-family:var(--display);font-weight:600;font-size:23px;line-height:1;letter-spacing:-.5px}
.kpi .k-l{font-size:11px;color:var(--text-3);margin-top:5px;font-weight:500}
.kpi.tone-ok .k-n{color:var(--ok)} .kpi.tone-warn .k-n{color:var(--warn)} .kpi.tone-bad .k-n{color:var(--bad)} .kpi.tone-acc .k-n{color:var(--accent-deep)} .kpi.tone-hot .k-n{color:var(--hot)}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:4px 0 18px}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px}
.seg button{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:6px;transition:.12s}
.seg button svg{width:15px;height:15px}
.seg button.on{background:var(--surface);color:var(--accent-deep);box-shadow:var(--shadow-1)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:500;color:var(--text-2);background:var(--surface);border:1px solid var(--line);display:inline-flex;align-items:center;gap:7px;transition:.12s;white-space:nowrap}
.chip:hover{border-color:var(--line-2)}
.chip .c-n{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.on .c-n{color:rgba(255,255,255,.75)}
.chip .c-sw{width:8px;height:8px;border-radius:50%}
.tb-search{position:relative;margin-left:auto;min-width:200px}
.tb-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-3)}
.tb-search input{width:100%;height:36px;padding:0 12px 0 32px;border-radius:9px;background:var(--surface);border:1px solid var(--line);font-size:13px}
.tb-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
.btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 15px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--surface);color:var(--text);transition:.14s;box-shadow:var(--shadow-1)}
.btn:hover{background:var(--surface-2)}
.btn svg{width:16px;height:16px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(20,24,31,.12), 0 8px 20px -12px var(--accent)}
.btn.primary:hover{background:var(--accent-deep)}
.btn.hot{background:var(--hot);border-color:var(--hot);color:#fff}
.btn.hot:hover{filter:brightness(.94)}
.btn.ghost{background:transparent;box-shadow:none}
.btn.sm{height:32px;padding:0 11px;font-size:12.5px;border-radius:9px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.block{width:100%;justify-content:center;height:46px;font-size:14px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge .b-dot{width:6px;height:6px;border-radius:50%}
.bg-ok{background:var(--ok-tint);color:var(--ok)} .bg-ok .b-dot{background:var(--ok)}
.bg-warn{background:var(--warn-tint);color:var(--warn)} .bg-warn .b-dot{background:var(--warn)}
.bg-bad{background:var(--bad-tint);color:var(--bad)} .bg-bad .b-dot{background:var(--bad)}
.bg-info{background:var(--info-tint);color:var(--info)} .bg-info .b-dot{background:var(--info)}
.bg-hot{background:var(--hot-tint);color:var(--hot)} .bg-hot .b-dot{background:var(--hot)}
.bg-mut{background:var(--surface-3);color:var(--text-2)} .bg-mut .b-dot{background:var(--text-3)}
.bg-acc{background:var(--accent-tint);color:var(--accent-deep)} .bg-acc .b-dot{background:var(--accent)}
.flag{width:26px;height:19px;border-radius:3px;object-fit:cover;box-shadow:0 0 0 1px rgba(20,24,31,.08) inset;flex:0 0 auto;background:var(--surface-3)}
.flag.lg{width:34px;height:25px;border-radius:4px}
.flag.sm{width:20px;height:15px}
.flagfb{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;line-height:1;color:var(--text-2);background:var(--surface-3);letter-spacing:.01em;box-shadow:0 0 0 1px rgba(20,24,31,.08) inset}
.flag.sm.flagfb{font-size:7.5px}
.dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
.span-8{grid-column:span 8}.span-4{grid-column:span 4}.span-6{grid-column:span 6}.span-12{grid-column:span 12}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-1);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.panel-h .ph-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff}
.panel-h .ph-ic svg{width:17px;height:17px}
.panel-h h3{font-family:var(--display);font-weight:600;font-size:14.5px;letter-spacing:-.2px}
.panel-h .ph-sub{font-size:11.5px;color:var(--text-3)}
.panel-h .ph-act{margin-left:auto}
.link-arrow{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--accent);padding:5px 9px;border-radius:8px}
.link-arrow:hover{background:var(--accent-tint)}
.link-arrow svg{width:14px;height:14px}
.stationgrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:18px}
@media (max-width:1280px){.stationgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media (max-width:760px){.stationgrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:440px){.stationgrid{grid-template-columns:1fr}}
.combo-row{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--line)}
.combo-row:hover{background:var(--surface-2)}
.combo-row:last-child{border-bottom:none}
.help-card{border:1px solid var(--line);border-radius:13px;padding:15px;background:var(--surface-2);margin-bottom:14px}
.help-card .hc-top{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.help-card .hc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#fff;flex:0 0 34px}
.help-card .hc-ic svg{width:18px;height:18px}
.help-card .hc-t{font-weight:600;font-size:14px}
.help-card .hc-s{font-size:12px;color:var(--text-3)}
.stock-pill{font-family:var(--mono);font-weight:600;font-size:12.5px}
.stock-pill.low{color:var(--warn)} .stock-pill.out{color:var(--bad)}
.reqbar{height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden}
.reqbar-fill{height:100%;background:var(--accent);border-radius:5px;min-width:3px}
.recent-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line)}
.recent-row:last-child{border-bottom:none}
.station-card{display:block;padding:16px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow-1);position:relative;overflow:hidden;transition:transform .16s, box-shadow .16s;cursor:pointer}
.station-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)}
.station-card .sc-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.station-card .sc-top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.station-card .sc-ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff}
.station-card .sc-ic svg{width:18px;height:18px}
.station-card .sc-name{font-family:var(--display);font-weight:600;font-size:14px}
.station-card .sc-role{font-size:11px;color:var(--text-3)}
.station-card .sc-big{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-1px;line-height:1}
.station-card .sc-big small{font-size:13px;color:var(--text-3);font-weight:500;letter-spacing:0}
.station-card .sc-meta{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.feed{display:flex;flex-direction:column}
.feed-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.feed-row:last-child{border-bottom:none}
.feed-ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 30px}
.feed-ic svg{width:15px;height:15px}
.feed-main{flex:1;min-width:0}
.feed-t{font-size:13px;font-weight:500}
.feed-s{font-size:11.5px;color:var(--text-3);margin-top:1px}
.feed-time{font-family:var(--mono);font-size:11px;color:var(--text-3);white-space:nowrap}
.ticker{display:flex;flex-direction:column;gap:9px;padding:14px 16px}
.ticker-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;background:var(--surface-2);border:1px solid var(--line);cursor:pointer}
.ticker-row.urgent{background:var(--hot-tint);border-color:#f0d4c9}
.tk-clock{font-family:var(--mono);font-weight:600;font-size:16px;min-width:62px}
.tk-mid{flex:1;min-width:0}
.tk-team{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.tk-iss{font-size:11.5px;color:var(--text-2)}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-1);transition:.15s;cursor:pointer;position:relative}
.tcard:hover{box-shadow:var(--shadow-2);border-color:var(--line-2)}
.tcard-top{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.tcard-id{min-width:0;flex:1}
.tcard-country{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcard-meta{font-size:11.5px;color:var(--text-3);font-family:var(--mono);margin-top:1px}
.checklist{display:flex;gap:5px;margin-top:4px}
.chk{flex:1;height:5px;border-radius:3px;background:var(--surface-3)}
.chk.pass{background:var(--ok)} .chk.fail{background:var(--bad)} .chk.pend{background:var(--surface-3)}
.tcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px}
.tcard-insp{font-size:11px;color:var(--text-3)}
.ltable{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-1)}
.ltable thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:11px 16px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.ltable tbody td{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.ltable tbody tr:last-child td{border-bottom:none}
.ltable tbody tr{cursor:pointer;transition:background .12s}
.ltable tbody tr:hover{background:var(--surface-2)}
.cell-team{display:flex;align-items:center;gap:10px;font-weight:600}
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.kcol{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius);padding:10px;min-height:200px}
.kcol-h{display:flex;align-items:center;gap:8px;padding:6px 6px 10px}
.kcol-h .kc-sw{width:9px;height:9px;border-radius:3px}
.kcol-h .kc-name{font-weight:600;font-size:13px}
.kcol-h .kc-n{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:1px 8px}
.kcards{display:flex;flex-direction:column;gap:9px;min-height:30px}
.ticket{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px;box-shadow:var(--shadow-1);cursor:pointer;transition:.14s;border-left:3px solid var(--line-2)}
.ticket-cd{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:4px 9px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;background:var(--surface-3);color:var(--text-2)}
.ticket-cd svg{width:13px;height:13px;flex:0 0 13px}
.ticket-cd .tc-q{color:var(--text-3)}
.ticket-cd.t-warn{background:#fbf2e2;color:#9a6a1a}
.ticket-cd.t-crit{background:#fbe7e5;color:#b23b32}
.tchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tchip{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:8px;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12px;font-weight:600;background:var(--surface-3);color:var(--text-2)}
.tchip svg{width:13px;height:13px;flex:0 0 13px}
.tchip b{font-weight:600}
.tchip.work{background:var(--accent-tint);color:var(--accent-deep)}
.tchip.wait{background:var(--surface-3);color:var(--text-2)}
.tchip.wait.warn{background:#fbf2e2;color:#9a6a1a}
.tchip.wait.crit{background:#fbe7e5;color:#b23b32}
.tchip.done{background:var(--ok-tint);color:var(--ok)}
.tchip.loc{background:var(--surface-2);color:var(--text-2);font-family:var(--font);font-weight:500}
.tchip.match{background:var(--surface-3);color:var(--text-2)}
.tchip.match.t-warn{background:#fbf2e2;color:#9a6a1a}
.tchip.match.t-crit{background:#fbe7e5;color:#b23b32}
.kcol-toggle{margin-left:auto;display:inline-flex;align-items:center;gap:7px;cursor:pointer;color:var(--text-3);background:none;border:none}
.kcol-toggle:hover{color:var(--text-2)}
.kcol-toggle svg{width:15px;height:15px;transition:transform .15s}
.kcol-toggle.open svg{transform:rotate(90deg)}
.kcol-toggle .kc-n{margin-left:0}
.done-collapsed{padding:16px 12px;text-align:center;color:var(--text-3);font-size:12.5px;line-height:1.5}
.done-collapsed b{color:var(--text-2);font-family:var(--mono);font-size:15px}
.done-list{display:flex;flex-direction:column;gap:6px}
.done-row{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--surface);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:background .12s}
.done-row:hover{background:var(--surface-2)}
.done-row .dr-team{font-weight:600;font-size:12.5px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px}
.done-row .dr-time{font-family:var(--mono);font-size:11px;color:var(--ok);font-weight:600;white-space:nowrap}
.done-more{padding:8px;text-align:center;color:var(--text-3);font-size:11px}
.ticket:hover{box-shadow:var(--shadow-2)}
.ticket.p-high{border-left-color:var(--bad)} .ticket.p-normal{border-left-color:var(--warn)} .ticket.p-low{border-left-color:var(--info)}
.ticket-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ticket-id{font-family:var(--mono);font-size:10.5px;color:var(--text-3)}
.ticket-iss{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:9px}
.ticket-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ticket-tech{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2)}
.mini-av{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:9.5px;font-weight:600;color:#fff;font-family:var(--display);flex:0 0 20px}
.ticket-age{font-family:var(--mono);font-size:10.5px;color:var(--text-3)}
.ezone{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.ecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-2);position:relative}
.ecard-band{height:5px;background:var(--accent)}
.ecard.t-crit .ecard-band{background:var(--hot)}
.ecard.t-warn .ecard-band{background:var(--warn)}
.ecard-body{padding:16px}
.ecard-top{display:flex;align-items:center;gap:12px}
.ecard-cd{font-family:var(--mono);font-weight:600;font-size:34px;letter-spacing:-1px;line-height:1}
.ecard.t-crit .ecard-cd{color:var(--hot)}
.ecard.t-warn .ecard-cd{color:var(--warn)}
.ecard-match{margin-left:auto;text-align:right}
.ecard-match .em-q{font-family:var(--mono);font-weight:600;font-size:14px}
.ecard-match .em-l{font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
.ecard-team{display:flex;align-items:center;gap:11px;margin:15px 0 11px;padding-top:14px;border-top:1px solid var(--line)}
.ecard-team .et-name{font-weight:600;font-size:15px}
.ecard-team .et-loc{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.ecard-iss{font-size:13px;color:var(--text-2);margin-bottom:14px;line-height:1.4}
.ecard-actions{display:flex;gap:8px;flex-wrap:wrap}
.display{position:fixed;inset:0;z-index:200;background:#10141b;color:#fff;display:none;flex-direction:column;padding:34px 40px}
.display.on{display:flex}
.disp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
.disp-head .dh-l{display:flex;align-items:center;gap:16px}
.disp-title{font-family:var(--display);font-weight:600;font-size:26px;letter-spacing:-.4px}
.disp-title small{display:block;font-size:13px;color:#8a94a6;font-weight:400;letter-spacing:0;margin-top:3px}
.disp-clock{font-family:var(--mono);font-size:24px;font-weight:600}
.disp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;overflow-y:auto}
.dcard{background:#1a2029;border:1px solid #2a323e;border-radius:18px;padding:22px;border-left:6px solid #2a323e}
.dcard.t-crit{border-left-color:var(--hot)} .dcard.t-warn{border-left-color:var(--warn)}
.dcard-cd{font-family:var(--mono);font-weight:600;font-size:58px;letter-spacing:-2px;line-height:.9}
.dcard.t-crit .dcard-cd{color:#e8714f} .dcard.t-warn .dcard-cd{color:#d8a23e}
.dcard-team{display:flex;align-items:center;gap:13px;margin:16px 0 10px}
.dcard-team .dt-n{font-family:var(--display);font-weight:600;font-size:22px}
.dcard-q{font-family:var(--mono);color:#8a94a6;font-size:15px}
.dcard-iss{color:#c2cad6;font-size:15px;margin-top:8px}
.dcard-st{margin-top:14px}
.btn-x-disp{background:#1a2029;border:1px solid #2a323e;color:#fff;border-radius:10px;height:40px;padding:0 16px;display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.btn-x-disp:hover{background:#222a35}
.qmatch{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-1);overflow:hidden;margin-bottom:14px}
.qmatch-h{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--surface-2);flex-wrap:wrap}
.qmatch-q{font-family:var(--display);font-weight:600;font-size:17px}
.qmatch-time{font-family:var(--mono);font-size:13px;color:var(--text-2)}
.tbl-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:9px;background:var(--surface);border:1px solid var(--line-2);color:var(--text-2)}
.tbl-chip svg{width:14px;height:14px;color:var(--text-3)}
.tbl-chip.main{background:#1f242c;color:#fff;border-color:#1f242c}
.tbl-chip.main svg{color:#c9d2dd}
.qmatch-cd{margin-left:auto;display:flex;align-items:center;gap:9px}
.qmatch-cd .qcd-n{font-family:var(--mono);font-weight:600;font-size:16px}
.qrow{display:grid;grid-template-columns:1fr 1fr;gap:0}
.qalliance{padding:14px 18px}
.qalliance.qa-blue{border-right:1px solid var(--line);box-shadow:inset 3px 0 0 var(--blue)}
.qalliance.qa-red{box-shadow:inset -3px 0 0 var(--red)}
.qa-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.qa-blue .qa-label{color:var(--blue)} .qa-red .qa-label{color:var(--red)}
.qa-label .qa-sw{width:9px;height:9px;border-radius:2px}
.qa-blue .qa-sw{background:var(--blue)} .qa-red .qa-sw{background:var(--red)}
.qteam{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px;transition:background .12s}
.qteam:hover{background:var(--surface-2)}
.qteam+.qteam{margin-top:3px}
.qteam.q-missing{background:var(--bad-tint)}
.qteam-name{flex:1;min-width:0;font-weight:500;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qstate{cursor:pointer}
/* table filter bar */
.qfilter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.qchip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:11px;border:1px solid var(--line-2);background:var(--surface);color:var(--text-2);font-weight:600;font-size:13px;cursor:pointer;transition:background .14s,border-color .14s,color .14s}
.qchip svg{width:15px;height:15px;color:var(--text-3)}
.qchip:hover{background:var(--surface-2);border-color:var(--line-3,var(--line-2))}
.qchip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.qchip.active svg{color:#fff}
.qchip-n{font-family:var(--mono);font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--surface-3);color:var(--text-3)}
.qchip.active .qchip-n{background:rgba(255,255,255,.22);color:#fff}
.qchip.main{border-color:#c9aa5e;color:#7a6326;background:linear-gradient(180deg,#fdf8ec,#f8efd8)}
.qchip.main svg{color:#b5933f}
.qchip.main .qchip-n{background:#efe0bd;color:#7a6326}
.qchip.main.active{background:#1f242c;border-color:#1f242c;color:#f4d98a}
.qchip.main.active svg{color:#f4d98a}
.qchip.main.active .qchip-n{background:rgba(244,217,138,.2);color:#f4d98a}
/* table sections */
.qtables{display:flex;flex-direction:column;gap:14px}
.qtable{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-1);overflow:hidden}
.qtable.is-main{border-color:#d9c189;box-shadow:0 0 0 1px #e7d4a4,var(--shadow-2)}
.qtable-h{display:flex;align-items:center;gap:13px;width:100%;padding:14px 18px;background:var(--surface-2);border:none;border-bottom:1px solid var(--line);cursor:pointer;text-align:left;font:inherit;color:inherit;flex-wrap:wrap}
.qtable-h:hover{background:var(--surface-3)}
.qtable-h.main{background:linear-gradient(110deg,#1f242c,#2b323d);border-bottom-color:#1f242c;color:#fff}
.qtable-h.main:hover{background:linear-gradient(110deg,#252b34,#323a47)}
.qt-ic{display:flex;width:34px;height:34px;flex:0 0 34px;align-items:center;justify-content:center;border-radius:10px;background:#272d37;color:#fff}
.qt-ic svg{width:18px;height:18px}
.qtable-h.main .qt-ic{background:#f4d98a;color:#3a2f10}
.qt-name{font-family:var(--display);font-weight:600;font-size:16px;display:flex;align-items:center}
.qt-mainbadge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:7px;background:#f4d98a;color:#3a2f10}
.qt-sum{font-family:var(--mono);font-size:12.5px;color:var(--text-2)}
.qtable-h.main .qt-sum{color:#d7dde6}
.qt-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--surface-3);color:var(--text-2)}
.qt-badge.ok{background:var(--ok-tint);color:var(--ok)}
.qt-badge.bad{background:var(--bad-tint);color:var(--bad)}
.qtable-h.main .qt-badge{background:rgba(255,255,255,.14);color:#eef2f7}
.qtable-h.main .qt-badge.bad{background:rgba(214,128,126,.32);color:#ffd9d7}
.qt-count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--text-3)}
.qtable-h.main .qt-count{color:#aeb7c4}
.qtable-body{padding:16px 18px 6px}
.qmatch.is-current{border-color:var(--accent-line);box-shadow:0 0 0 1.5px var(--accent-line),var(--shadow-2)}
.qmatch.is-current .qmatch-h{background:var(--accent-tint)}
.q-ondeck{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--accent);color:#fff}
.od-dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.7);animation:odpulse 1.6s infinite}
@keyframes odpulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.55)}70%{box-shadow:0 0 0 6px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.qlunch{display:flex;align-items:center;justify-content:center;gap:9px;margin:4px 0 14px;padding:10px;border-radius:12px;background:var(--accent-soft);border:1px dashed var(--accent-line);color:var(--accent-deep);font-size:12.5px;font-weight:600}
.qlunch svg{width:15px;height:15px}
.qcoming{margin-top:2px;border-top:1px dashed var(--line-2);padding-top:12px}
.qcoming-h{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);margin-bottom:9px}
.qcoming-h svg{width:13px;height:13px}
.qmini{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;background:var(--surface-2);margin-bottom:6px}
.qmini-q{font-family:var(--display);font-weight:600;font-size:13.5px;min-width:42px}
.qmini-time{font-family:var(--mono);font-size:12px;color:var(--text-3)}
.qmini-cd{margin-left:auto;font-family:var(--mono);font-weight:600;font-size:12.5px;color:var(--text-2)}
.qmore{display:inline-flex;align-items:center;gap:7px;margin-top:4px;padding:7px 2px;background:none;border:none;cursor:pointer;color:var(--accent);font-weight:600;font-size:12.5px}
.qmore svg{width:15px;height:15px}
.qdone{display:flex;align-items:center;justify-content:center;gap:9px;padding:20px;color:var(--text-3);font-size:13px;font-weight:500}
.qdone svg{width:16px;height:16px;color:var(--ok)}
.qhint{color:var(--text-3);font-size:12px;margin-top:12px}
.qmorenote{display:flex;align-items:center;gap:8px;margin:2px 0 8px;padding:9px 12px;border-radius:10px;background:var(--surface-2);color:var(--text-3);font-size:12px;font-weight:500}
.qmorenote svg{width:14px;height:14px}
.jhead-note{display:flex;gap:10px;align-items:flex-start;padding:13px 16px;background:var(--accent-tint);border:1px solid var(--accent-line);border-radius:12px;margin-bottom:18px;font-size:12.5px;color:var(--accent-deep)}
.jhead-note svg{width:17px;height:17px;flex:0 0 17px;margin-top:1px}
/* judging: award filter */
.awfilter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.awchip{display:inline-flex;align-items:center;gap:8px;max-width:100%;padding:8px 13px;border-radius:11px;border:1px solid var(--line-2);background:var(--surface);color:var(--text-2);font-weight:600;font-size:12.5px;cursor:pointer;transition:background .14s,border-color .14s,color .14s}
.awchip svg{width:15px;height:15px;flex:0 0 15px;color:#b3892a}
.awchip .awchip-tx{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.awchip:hover{background:var(--surface-2)}
.awchip.active{background:#8d6f2a;border-color:#8d6f2a;color:#fff}
.awchip.active svg{color:#f4d98a}
.awchip-n{font-family:var(--mono);font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--surface-3);color:var(--text-3)}
.awchip.active .awchip-n{background:rgba(255,255,255,.22);color:#fff}
.awbanner{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:13px;background:linear-gradient(110deg,#f7efd9,#fbf6e9);border:1px solid #e6d3a2;margin-bottom:16px}
.awbanner>svg{width:22px;height:22px;flex:0 0 22px;color:#9c7c2e}
.awb-name{font-family:var(--display);font-weight:600;font-size:15px;color:#5f4c1c}
.awb-sub{font-size:12px;color:#8a7434;margin-top:1px}
.awb-clear{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:9px;border:1px solid #d8c189;background:rgba(255,255,255,.6);color:#6b5621;font-weight:600;font-size:12px;cursor:pointer}
.awb-clear svg{width:13px;height:13px}
.awb-clear:hover{background:#fff}
/* judging: awaiting-evaluation roster */
.jpending-h{display:flex;align-items:center;gap:8px;margin:22px 0 12px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3)}
.jpending-h svg{width:14px;height:14px}
.jpending{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.jpend-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);text-align:left;font:inherit;color:inherit;cursor:pointer;transition:background .12s,border-color .12s}
.jpend-row[data-action]:hover{background:var(--surface-2);border-color:var(--line-2)}
.jpend-row:not([data-action]){cursor:default}
.jpend-name{flex:1;min-width:0;font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jpend-cta{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--accent)}
.jpend-cta svg{width:13px;height:13px}
.jpend-tag{font-size:11px;font-weight:600;color:var(--text-3);background:var(--surface-3);padding:2px 8px;border-radius:20px}

.lh-top{display:flex;align-items:center;gap:13px;position:relative;z-index:2}
.lh-mark{width:48px;height:48px}
.lh-org{font-family:var(--display);font-weight:700;font-size:16px}
.lh-org small{display:block;font-weight:400;font-size:11.5px;color:#9db4d4;letter-spacing:.02em}
.lh-mid{position:relative;z-index:2}

.lh-title{font-family:var(--display);font-weight:700;font-size:42px;line-height:1.04;letter-spacing:-1.2px;max-width:13ch}

.lp-inner{width:100%;max-width:400px;margin:auto 0}
.lf-h{font-family:var(--display);font-weight:600;font-size:25px;letter-spacing:-.4px}
.lf-sub{color:var(--text-2);font-size:13.5px;margin-top:7px}

.lf-divider{display:flex;align-items:center;gap:12px;margin:16px 0 12px;color:var(--text-3);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.lf-divider::before,.lf-divider::after{content:"";height:1px;background:var(--line);flex:1}
.personas{display:flex;flex-direction:column;gap:7px}
.persona{display:flex;align-items:center;gap:12px;width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface);box-shadow:var(--shadow-1);transition:.15s;text-align:left}

.persona .p-mid{flex:1;min-width:0}
.persona .p-name{font-weight:600;font-size:14px}
.persona .p-role{font-size:11.5px;color:var(--text-3)}

.persona .p-cred .pc-l{font-size:9.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
.persona .p-cred .pc-v{font-family:var(--mono);font-size:11.5px;color:var(--text-2);font-weight:600}
@media (max-width:1180px){
  .dash-grid{grid-template-columns:repeat(8,1fr)}

}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

/* ---------- deterministic seed ---------- */
function rnd(i){const x=Math.sin(i*97.13+3.7)*10000;return x-Math.floor(x);}

/* ---------- inspections data ---------- */
const INSP_ITEMS=['Dimensions','Material Used','Code','Safety','Lights'];
const inspectorPool=VOLUNTEERS.filter(v=>v.r==='Inspector').map(v=>v.n);
function deriveOverall(items){
 const p=items.filter(x=>x==='pass').length,f=items.filter(x=>x==='fail').length,pe=items.filter(x=>x==='pending').length;
 if(pe===items.length)return 'Not started';
 if(p===items.length)return 'Passed';
 if(f>0&&pe===0)return 'Reinspection';
 return 'In progress';
}
const TEAMS=COUNTRIES.map(function(c,i){
 const roll=rnd(i*3+1);
 let items;
 if(roll<0.50){items=INSP_ITEMS.map(function(){return 'pass';});}
 else if(roll<0.70){items=INSP_ITEMS.map(function(){return 'pending';});}
 else{items=INSP_ITEMS.map(function(_,j){const rr=rnd(i*10+j+5);return rr<0.6?'pass':(rr<0.76?'fail':'pending');});}
 const overall=deriveOverall(items);
 const inspector=overall==='Not started'?null:inspectorPool[Math.floor(rnd(i*7+2)*inspectorPool.length)];
 return {id:101+i,code:c[0],country:c[1],pit:'Pit '+String.fromCharCode(65+(i%6))+(1+(i%19)),items:items,overall:overall,inspector:inspector};
});
function teamByCode(code){return TEAMS.find(function(t){return t.code===code;});}

/* ---------- matches / queueing ----------
   Grouped by table. The 5 tables run in parallel; each table plays 12
   qualification matches across the day: 4 before the 12:00-13:00 lunch break
   and 8 after. Qual numbers run across all tables within a round. */
const TABLES=[1,2,3,4,5];
const ROUNDS_BEFORE=4, ROUNDS_AFTER=8;
function _dayAt(h,m){var d=new Date();d.setHours(h,m,0,0);return d.getTime();}
/* Schedule is anchored to the current time so the event is always "in progress":
   a couple of rounds have just played and the rest are upcoming, on every load,
   regardless of the wall-clock hour. */
var _RT0=[_dayAt(9,30),_dayAt(10,10),_dayAt(10,50),_dayAt(11,30),_dayAt(13,0),_dayAt(13,35),_dayAt(14,10),_dayAt(14,45),_dayAt(15,20),_dayAt(15,55),_dayAt(16,30),_dayAt(17,5)];
var _ANCHOR=2, _LEAD=180000; /* 2 rounds already played; next match ~3 min out */
var _SHIFT=(Date.now()+_LEAD)-_RT0[_ANCHOR];
const ROUND_TIMES=_RT0.map(function(t){return t+_SHIFT;});
const LUNCH_START=_dayAt(12,0)+_SHIFT, LUNCH_END=_dayAt(13,0)+_SHIFT;
const MATCHES=[];
(function(){
 var pool=COUNTRIES.map(function(c){return c[0];});
 var seed=20261007;
 function rand(){seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;}
 function sixDistinct(){var s=[],guard=0;while(s.length<6&&guard<400){var c=pool[Math.floor(rand()*pool.length)];if(s.indexOf(c)<0)s.push(c);guard++;}return s;}
 var rounds=ROUNDS_BEFORE+ROUNDS_AFTER;
 for(var r=0;r<rounds;r++){for(var ti=0;ti<TABLES.length;ti++){var tbl=TABLES[ti];var qn=r*TABLES.length+tbl;var six=sixDistinct();MATCHES.push({q:'Q'+qn,n:qn,table:tbl,round:r,at:ROUND_TIMES[r],beforeLunch:r<ROUNDS_BEFORE,A:six.slice(0,3),B:six.slice(3,6),played:ROUND_TIMES[r]<Date.now()});}}
})();
const QSTATES=['Not queued','Queued','Missing'];
const queueState={};
MATCHES.forEach(function(m){m.A.concat(m.B).forEach(function(code){queueState[m.q+'_'+code]='Not queued';});});
function setQ(q,code,s){queueState[q+'_'+code]=s;}
(function(){
 var up=MATCHES.filter(function(m){return !m.played;}).sort(function(a,b){return a.at-b.at;});
 if(up[0]){up[0].A.concat(up[0].B).forEach(function(c){setQ(up[0].q,c,'Queued');});setQ(up[0].q,up[0].B[2],'Missing');}
 if(up[1]){up[1].A.concat(up[1].B).slice(0,4).forEach(function(c){setQ(up[1].q,c,'Queued');});}
 if(up[2]){setQ(up[2].q,up[2].A[0],'Queued');setQ(up[2].q,up[2].B[1],'Missing');}
})();

function flag(code,cls){var u=esc(String(code).toUpperCase());var src=FLAGS[code];if(!src)return '<span class="flag flagfb '+(cls||'')+'">'+u+'</span>';return '<img class="flag '+(cls||'')+'" src="'+src+'" alt="'+u+'" loading="lazy">';}
function initials(name){const p=String(name).trim().split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function avatar(name,cls,extra){return '<span class="avatar '+(cls||'')+'" style="background:'+volColor(name)+';'+(extra||'')+'">'+initials(name)+'</span>';}
function miniAv(name){return '<span class="mini-av" style="background:'+volColor(name)+'">'+initials(name)+'</span>';}
function ago(m){m=Math.round(m);if(m<1)return 'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60),mm=m%60;return h+'h'+(mm?' '+mm+'m':'')+' ago';}
function fmtAge(m){if(m<60)return m+'m';const h=Math.floor(m/60),mm=m%60;return h+'h'+(mm?mm+'m':'');}
function fmtCD(ms){if(ms<=0)return 'NOW';const s=Math.floor(ms/1000),m=Math.floor(s/60),ss=s%60;if(m>=60){const h=Math.floor(m/60),mm=m%60;return h+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');}return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function elapsedClock(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000),m=Math.floor(s/60),ss=s%60;if(m>=60){const h=Math.floor(m/60),mm=m%60;return h+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');}return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function durLabel(ms){if(ms<0)ms=0;const m=Math.round(ms/60000);if(m<1)return 'under a minute';if(m<60)return m+'m';const h=Math.floor(m/60),mm=m%60;return h+'h'+(mm?' '+mm+'m':'');}
function clockHM(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function cdTone(ms){if(ms<=180000)return 't-crit';if(ms<=480000)return 't-warn';return 't-ok';}
function toast(msg,accTxt){const t=$('toaster');const d=document.createElement('div');d.className='toast';d.innerHTML=icon('check')+'<span>'+esc(msg)+'</span>'+(accTxt?'<span class="t-acc">'+esc(accTxt)+'</span>':'');t.appendChild(d);setTimeout(function(){d.style.transition='opacity .3s,transform .3s';d.style.opacity='0';d.style.transform='translateY(8px)';setTimeout(function(){d.remove();},300);},2600);}
function actor(){return state.user?state.user.name:'Volunteer';}
function logActivity(o){o.m=0;ACTIVITY.unshift(o);if(ACTIVITY.length>24)ACTIVITY.pop();const an=$('act-n');if(an)an.textContent=ACTIVITY.length;}

const TONE={ok:['var(--ok-tint)','var(--ok)'],hot:['var(--hot-tint)','var(--hot)'],info:['var(--info-tint)','var(--info)'],bad:['var(--bad-tint)','var(--bad)'],warn:['var(--warn-tint)','var(--warn)'],mut:['var(--surface-3)','var(--text-2)'],acc:['var(--accent-tint)','var(--accent-deep)']};

/* ---------- access ---------- */
function access(){return ROLE_ACCESS[state.role]||{view:['dashboard'],edit:[]};}
function canView(st){var v=access().view;return !!v&&v.indexOf(st)>=0;}
function canEdit(st){return access().edit.indexOf(st)>=0;}
function requireEdit(st){if(canEdit(st))return true;toast('View only \u00b7 '+(STATIONS[st]?STATIONS[st].name:st)+' is handled by another role');return false;}

/* ---------- badges ---------- */
function overallBadge(s){const m={'Passed':'bg-ok','In progress':'bg-warn','Not started':'bg-mut','Reinspection':'bg-bad'};return '<span class="badge '+(m[s]||'bg-mut')+'"><span class="b-dot"></span>'+s+'</span>';}
function priBadge(p){const m={high:['bg-bad','High'],normal:['bg-warn','Normal'],low:['bg-info','Low']};const x=m[p]||m.normal;return '<span class="badge '+x[0]+'"><span class="b-dot"></span>'+x[1]+'</span>';}
function ticketBadge(st){const m={'Waiting':'bg-mut','In progress':'bg-warn','Done':'bg-ok'};return '<span class="badge '+(m[st]||'bg-mut')+'"><span class="b-dot"></span>'+st+'</span>';}
function typeBadge(tp){if(!tp)return '';return '<span class="badge bg-acc"><span class="b-dot"></span>'+esc(tp)+'</span>';}
function emgBadge(st){const m={'On it':'bg-warn','Waiting':'bg-bad','Resolved':'bg-ok','Will not make match':'bg-mut'};return '<span class="badge '+(m[st]||'bg-mut')+'"><span class="b-dot"></span>'+st+'</span>';}
function qBadge(s){const m={'Not queued':'bg-mut','Queued':'bg-info','Missing':'bg-bad'};return '<span class="badge '+(m[s]||'bg-mut')+'"><span class="b-dot"></span>'+s+'</span>';}
function checklistBar(items){return '<div class="checklist">'+items.map(function(x){return '<span class="chk '+(x==='pass'?'pass':x==='fail'?'fail':'pend')+'"></span>';}).join('')+'</div>';}

/* ---------- navigation ---------- */
const CORE=['dashboard','inspections','hospital','spares','queueing','judging'];
const LOCK_SVG='<svg class="ni-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>';
function buildNav(){
 let h='<div class="nav-label">Operations</div>';
 CORE.forEach(function(k){
   if(!canView(k))return;
   const s=STATIONS[k];
   h+='<button class="nav-item" data-action="go" data-go="'+k+'">'+icon(s.icon,'ni-ic')+'<span class="ni-tx">'+s.name+'</span><span class="ni-count" data-count="'+k+'"></span></button>';
 });
 $('nav').innerHTML=h;
 let b='';
 CORE.forEach(function(k){if(!canView(k))return;const s=STATIONS[k];b+='<button class="bn-item" data-action="go" data-go="'+k+'">'+icon(s.icon)+'<span class="bn-tx">'+s.short+'</span></button>';});
 $('botnav').innerHTML=b;

function updateNavCounts(){
 const c={inspections:TEAMS.filter(function(t){return t.overall!=='Passed';}).length,hospital:TICKETS.filter(function(t){return t.st!=='Done';}).length,spares:SPARES.filter(function(p){return p.inv<=0;}).length,queueing:MATCHES.filter(function(m){return !m.played;}).length};
 document.querySelectorAll('[data-count]').forEach(function(el){const k=el.getAttribute('data-count');el.textContent=(c[k]!=null?c[k]:'');});
}
function setActiveNav(station){document.querySelectorAll('.nav-item,.bn-item').forEach(function(el){el.classList.toggle('active',el.getAttribute('data-go')===station);});}
function go(station){
 if(!canView(station)){toast((STATIONS[station]?STATIONS[station].name:'That station')+' is restricted');return;}
 state.station=station;$('app').setAttribute('data-station',station);setActiveNav(station);
 document.querySelectorAll('.view').forEach(function(v){v.classList.toggle('is-active',v.id==='view-'+station);});
 closeDrawer();closeSearch();closeUserMenu();
 render(station);window.scrollTo(0,0);
}
function render(station){({dashboard:renderDashboard,inspections:renderInspections,hospital:renderHospital,spares:renderSpares,queueing:renderQueue,judging:renderJudging}[station]||function(){})();}

/* ---------- KPI + page-head helpers ---------- */
function kpi(n,l,tone){return '<div class="kpi'+(tone?' tone-'+tone:'')+'"><div class="k-n">'+n+'</div><div class="k-l">'+l+'</div></div>';}
function phead(station,title,sub,kpis){const s=STATIONS[station];return '<div class="phead"><div><div class="eyebrow"><span class="eb-dot"></span>'+s.name+'</div><h1 class="ptitle">'+title+'</h1><p class="psub">'+sub+'</p></div><div class="kpis">'+kpis+'</div></div>';}

/* ================= DASHBOARD ================= */
function statCard(k,big,bigsm,metas,locked){

 return '<button class="station-card" data-action="go" data-go="'+k+'"><span class="sc-bar" style="background:'+s.color+'"></span><div class="sc-top"><span class="sc-ic" style="background:'+s.color+'">'+icon(s.icon)+'</span><div><div class="sc-name">'+s.name+'</div><div class="sc-role">'+(locked?'View limited':'Tap to open')+'</div></div></div><div class="sc-big">'+big+(bigsm?' <small>'+bigsm+'</small>':'')+'</div><div class="sc-meta">'+metas+'</div></button>';
}
function feedRow(a){const t=TONE[a.tone]||TONE.mut;return '<div class="feed-row"><span class="feed-ic" style="background:'+t[0]+';color:'+t[1]+'">'+icon(a.ic)+'</span><div class="feed-main"><div class="feed-t">'+esc(a.t)+'</div><div class="feed-s">'+esc(a.s)+'</div></div><span class="feed-time">'+ago(a.m)+'</span></div>';}
function renderDashboard(){
 const total=TEAMS.length;
 const passed=TEAMS.filter(function(t){return t.overall==='Passed';}).length;
 const inProg=TEAMS.filter(function(t){return t.overall==='In progress';}).length;
 const notStarted=TEAMS.filter(function(t){return t.overall==='Not started';}).length;
 const reins=TEAMS.filter(function(t){return t.overall==='Reinspection';}).length;
 const openT=TICKETS.filter(function(t){return t.st!=='Done';}).length;
 const highT=TICKETS.filter(function(t){return t.pri==='high'&&t.st!=='Done';}).length;
 const hospInprog=TICKETS.filter(function(t){return t.st==='In progress';}).length;
 const spareLow=SPARES.filter(function(p){return p.inv<=0;}).length;
 const matchCrit=TICKETS.filter(function(t){return t.matchAt&&t.st!=='Done'&&(t.matchAt-Date.now())<=10*MIN;}).length;
 const inProgMatch=TICKETS.filter(function(t){return t.matchAt&&t.st!=='Done';}).length;
 const upcoming=MATCHES.filter(function(m){return !m.played;}).length;
 const missing=Object.keys(queueState).filter(function(k){return queueState[k]==='Missing';}).length;
 const a=access();
 const hello=state.user?('Welcome, '+esc(state.user.name)):'Operations overview';

 let html=phead('dashboard',hello,'Live status across inspections, the Robot Hospital, spare parts, queueing and judging \u00b7 Incheon, day 2 qualifications.',
   kpi(total,'Teams','acc')+kpi(passed,'Inspection passed','ok')+kpi(openT,'In hospital','warn')+kpi(matchCrit,'Match critical',matchCrit?'bad':'ok')+kpi(missing,'Missing now','bad'));

 html+='<div class="stationgrid">';
 if(canView('inspections'))html+=statCard('inspections',passed,'/ '+total+' passed','<span class="badge bg-warn"><span class="b-dot"></span>'+inProg+' in progress</span><span class="badge bg-mut"><span class="b-dot"></span>'+notStarted+' to go</span>',!canEdit('inspections'));
 if(canView('hospital'))html+=statCard('hospital',openT,'open tickets','<span class="badge bg-bad"><span class="b-dot"></span>'+highT+' high</span>'+(matchCrit?'<span class="badge bg-hot"><span class="b-dot"></span>'+matchCrit+' match critical</span>':'<span class="badge bg-info"><span class="b-dot"></span>'+hospInprog+' in progress</span>'),!canEdit('hospital'));
 if(canView('spares'))html+=statCard('spares',spareLow,'out of stock','<span class="badge bg-mut"><span class="b-dot"></span>'+SPARES.length+' parts</span><span class="badge bg-mut"><span class="b-dot"></span>'+kitsOpen+' kits open</span>',!canEdit('spares'));
 if(canView('queueing'))html+=statCard('queueing',upcoming,'matches up','<span class="badge '+(missing?'bg-bad':'bg-ok')+'"><span class="b-dot"></span>'+missing+' missing</span><span class="badge bg-mut"><span class="b-dot"></span>5 tables</span>',!canEdit('queueing'));
 if(canView('judging'))html+=statCard('judging',JUDGE_TEAMS.length,'on slate','<span class="badge bg-mut"><span class="b-dot"></span>3 judges</span>',!canEdit('judging'));
 html+='</div>';

 html+='<div class="dash-grid">';
 // activity
 html+='<div class="span-8"><div class="panel"><div class="panel-h"><span class="ph-ic" style="background:var(--accent)">'+icon('info')+'</span><div><h3>Live activity</h3><div class="ph-sub">Across all stations</div></div><div class="ph-act"><button class="link-arrow" data-action="activity-open">View all '+icon('arrow')+'</button></div></div><div class="feed">'+ACTIVITY.slice(0,10).map(feedRow).join('')+'</div></div></div>';
 // in-shop teams and their next match
 const eactive=TICKETS.filter(function(t){return t.matchAt&&t.st!=='Done';}).sort(function(x,y){return x.matchAt-y.matchAt;});
 let tick=eactive.map(function(t){const ms=t.matchAt-Date.now();const crit=cdTone(ms)==='t-crit';return '<div class="ticker-row'+(crit?' urgent':'')+'" data-action="open-ticket" data-id="'+t.id+'"><span class="tk-clock" data-countdown="'+t.matchAt+'">'+fmtCD(ms)+'</span><div class="tk-mid"><div class="tk-team">'+flag(t.code,'sm')+esc(t.team)+' <span style="color:var(--text-3);font-weight:500">'+(t.match||'')+'</span></div><div class="tk-iss">'+esc(t.iss)+'</div></div></div>';}).join('');
 if(!tick)tick='<div class="empty" style="padding:30px 10px"><div class="e-t">All clear</div><div>No teams waiting on a match</div></div>';
 html+='<div class="span-4"><div class="panel"><div class="panel-h"><span class="ph-ic" style="background:#2c6e6a">'+icon('emergency')+'</span><div><h3>In the shop</h3><div class="ph-sub">Next match countdowns</div></div></div><div class="ticker">'+tick+'</div></div></div>';
 // inspections at a glance
 const segs=[['Passed',passed,'var(--ok)'],['In progress',inProg,'var(--warn)'],['Reinspection',reins,'var(--bad)'],['Not started',notStarted,'var(--text-3)']];
 let bars=segs.map(function(s){const pct=Math.round(s[1]/total*100);return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span style="font-weight:500">'+s[0]+'</span><span class="mono" style="color:var(--text-3)">'+s[1]+' &middot; '+pct+'%</span></div><div style="height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+s[2]+';border-radius:5px"></div></div></div>';}).join('');

 html+='<div class="span-6"><div class="panel"><div class="panel-h"><span class="ph-ic" style="background:#272d37">'+icon('queueing')+'</span><div><h3>Up next</h3><div class="ph-sub">Next matches on the field</div></div><div class="ph-act"><button class="link-arrow" data-action="go" data-go="queueing">Queue '+icon('arrow')+'</button></div></div><div class="ticker">'+mini+'</div></div></div>';
 html+='</div>';
 $('view-dashboard').innerHTML=html;
}

/* ================= INSPECTIONS ================= */
const INSP_FILTERS=['all','Passed','In progress','Not started','Reinspection'];
function inspFiltered(){
 let list=TEAMS.slice();
 if(state.inspFilter!=='all')list=list.filter(function(t){return t.overall===state.inspFilter;});
 const q=state.inspQuery.trim().toLowerCase();
 if(q)list=list.filter(function(t){return t.country.toLowerCase().indexOf(q)>=0||t.code.indexOf(q)>=0||String(t.id).indexOf(q)>=0||t.pit.toLowerCase().indexOf(q)>=0;});
 list.sort(function(a,b){return a.country.localeCompare(b.country);});
 return list;
}
function tcard(t){return '<div class="tcard" data-action="open-team" data-code="'+t.code+'"><div class="tcard-top">'+flag(t.code,'lg')+'<div class="tcard-id"><div class="tcard-country">'+esc(t.country)+'</div><div class="tcard-meta">#'+t.id+' &middot; '+esc(t.pit)+'</div></div></div>'+checklistBar(t.items)+'<div class="tcard-foot">'+overallBadge(t.overall)+'<span class="tcard-insp">'+(t.inspector?'by '+esc(t.inspector.split(' ')[0]):'unassigned')+'</span></div></div>';}

 const list=inspFiltered();const box=$('insp-list');if(!box)return;
 if(!list.length){box.innerHTML='<div class="empty">'+icon('search')+'<div class="e-t">No teams match</div><div>Try a different filter or search.</div></div>';return;}

 else{
   let rows=list.map(function(t){return '<tr data-action="open-team" data-code="'+t.code+'"><td><div class="cell-team">'+flag(t.code)+esc(t.country)+'</div></td><td class="mono" style="color:var(--text-3)">'+esc(t.pit)+'</td><td style="max-width:140px">'+checklistBar(t.items)+'</td><td>'+overallBadge(t.overall)+'</td><td>'+(t.inspector?'<div style="display:flex;align-items:center;gap:7px">'+miniAv(t.inspector)+esc(t.inspector.split(' ')[0])+'</div>':'<span style="color:var(--text-3)">\u00b7</span>')+'</td></tr>';}).join('');
   box.innerHTML='<table class="ltable"><thead><tr><th>Team</th><th>Pit</th><th>Progress</th><th>Status</th><th>Inspector</th></tr></thead><tbody>'+rows+'</tbody></table>';
 }
}

 $('view-inspections').innerHTML=html;

/* ================= ROBOT HOSPITAL ================= */
const HOSP_COLS=[['Waiting','#8b94a3'],['In progress','#2c6e6a'],['Done','#3f7d57']];
function hospFiltered(){
 let list=TICKETS.slice();
 if(state.hospPri!=='all')list=list.filter(function(t){return t.pri===state.hospPri;});
 const q=state.hospQuery.trim().toLowerCase();
 if(q)list=list.filter(function(t){return t.team.toLowerCase().indexOf(q)>=0||t.iss.toLowerCase().indexOf(q)>=0||t.id.toLowerCase().indexOf(q)>=0;});
 return list;
}
function ticketCard(t){
 var now=Date.now();var chips='';
 if(t.loc)chips+='<span class="tchip loc">'+icon('pin')+esc(t.loc)+'</span>';
 if(t.st==='Waiting')chips+='<span class="tchip wait" data-wait="'+t.waitingSince+'">'+icon('clock')+'Waiting <b data-elapsed="'+t.waitingSince+'">'+elapsedClock(now-t.waitingSince)+'</b></span>';
 else if(t.st==='In progress')chips+='<span class="tchip work">'+icon('wrench')+'Working <b data-elapsed="'+t.assignedAt+'">'+elapsedClock(now-t.assignedAt)+'</b></span>';
 else if(t.st==='Done')chips+='<span class="tchip done">'+icon('check')+'Resolved in '+durLabel(t.doneAt-t.enteredAt)+'</span>';
 if(t.matchAt&&t.st!=='Done'){var ms=t.matchAt-now;chips+='<span class="tchip match '+cdTone(ms)+'">'+icon('clock')+(t.match||'next')+' <b data-countdown="'+t.matchAt+'">'+fmtCD(ms)+'</b></span>';}
 var footRight=t.st==='Done'?'':'<span class="ticket-age">in shop <b data-elapsed="'+t.enteredAt+'">'+elapsedClock(now-t.enteredAt)+'</b></span>';
 return '<div class="ticket p-'+t.pri+'" data-action="open-ticket" data-id="'+t.id+'"><div class="ticket-top"><span class="ticket-id">'+t.id+'</span>'+priBadge(t.pri)+(t.type?typeBadge(t.type):'')+'</div><div class="ticket-iss"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">'+flag(t.code,'sm')+'<b style="font-weight:600">'+esc(t.team)+'</b></div>'+esc(t.iss)+'</div><div class="tchips">'+chips+'</div><div class="ticket-foot"><span class="ticket-tech">'+(t.tech?miniAv(t.tech)+esc(t.tech.split(' ')[0]):'<span style="color:var(--text-3)">Unassigned</span>')+'</span>'+footRight+'</div></div>';}
function paintHospBoard(){
 const list=hospFiltered();const box=$('hosp-board');if(!box)return;
 box.innerHTML=HOSP_COLS.map(function(col){
   const items=list.filter(function(t){return t.st===col[0];});
   if(col[0]==='Done'){
     var head='<div class="kcol-h"><span class="kc-sw" style="background:'+col[1]+'"></span><span class="kc-name">'+col[0]+'</span><span class="kc-n">'+items.length+'</span></div>';

 MATCHES.forEach(function(m){m.played=m.at<nowTs;});
 const upAll=MATCHES.filter(function(m){return !m.played;}).sort(function(a,b){return a.at-b.at;});

 const queued=liveKeys.filter(function(k){return queueState[k]==='Queued';}).length;

 const filter=state.qFilter||'all';
 let html=phead('queueing','Match queueing','Played matches drop off automatically as the day runs. Each table leads with its on\u2011deck match \u00b7 Table 5 is the main field.',
   kpi(upAll.length,'Matches up','acc')+kpi(queued,'Queued','ok')+kpi(notq,'Not queued','warn')+kpi(missing,'Missing','bad'));
 // table filter bar
 html+='<div class="qfilter"><button class="qchip'+(filter==='all'?' active':'')+'" data-action="q-filter" data-table="all">'+icon('grid')+'All tables</button>';

 html+='</div>';

 html+='<div class="qtables">';
 show.forEach(function(tbl){
   const up=upAll.filter(function(m){return m.table===tbl;});
   const main=tbl===5;
   const current=up[0];
   const tQueued=up.reduce(function(a,m){return a+m.A.concat(m.B).filter(function(c){return queueState[m.q+'_'+c]==='Queued';}).length;},0);
   const tMissing=up.reduce(function(a,m){return a+m.A.concat(m.B).filter(function(c){return queueState[m.q+'_'+c]==='Missing';}).length;},0);
   const sum=current?('On deck '+current.q+' \u00b7 '+clockHM(current.at)):'All matches complete';
   html+='<div class="qtable'+(main?' is-main':'')+'">';
   html+='<button class="qtable-h'+(main?' main':'')+'" data-action="q-filter" data-table="'+tbl+'"><span class="qt-ic">'+icon(main?'award':'monitor')+'</span><span class="qt-name">Table '+tbl+'</span>'+(main?'<span class="qt-mainbadge">Main field</span>':'')+'<span class="qt-sum">'+sum+'</span>'+(tMissing?'<span class="qt-badge bad">'+tMissing+' missing</span>':'')+'<span class="qt-badge ok">'+tQueued+' queued</span><span class="qt-count">'+up.length+' up</span></button>';
   html+='<div class="qtable-body">';
   if(!current){
     html+='<div class="qdone">'+icon('check')+'All matches for this table are complete</div>';

     html+=qMatchCard(ed,current,true);
     const rest=up.slice(1);
     if(rest.length)html+='<button class="qmore" data-action="q-filter" data-table="'+tbl+'">'+icon('arrow')+'See current + next '+Math.min(3,rest.length)+' on Table '+tbl+'</button>';
   } else {

 });

 paintCatalog();
}
function spareRecentHtml(){var recent=SPARE_REQUESTS.slice().sort(function(a,b){return a.when-b.when;}).slice(0,7);var rows=recent.map(function(r){var tm=teamByCode(r.code);return '<div class="recent-row"><div class="cell-team" style="flex:1;min-width:0">'+flag(r.code)+'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(tm?tm.country:r.team)+'</span></div><div style="font-size:12px;color:var(--text-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.desc||r.no)+'</div><span class="mono" style="font-weight:600;font-size:12px">x'+r.qty+'</span></div>';}).join('');if(!recent.length)rows='<div style="color:var(--text-3);font-size:13px;padding:14px">No requests yet.</div>';return '<div class="span-4"><div class="panel"><div class="panel-h"><span class="ph-ic" style="background:var(--accent)">'+icon('list')+'</span><div><h3>Recent requests</h3><div class="ph-sub">Latest from the parts desk</div></div></div><div style="padding:6px 14px 12px">'+rows+'</div></div></div>';}
function createSpareReq(){if(!requireEdit('spares'))return;var code=comboSel.spteam;if(!code){toast('Choose a team');return;}var no=comboSel.sppart;if(!no){toast('Choose a part');return;}var p=SPARES.find(function(x){return x.no===no;});if(!p)return;var qn=parseInt(($('spare-qty')||{}).value,10);var qty=qn>0?qn:1;if(p.inv<=0){toast('Out of stock',p.no);return;}if(qty>p.inv){qty=p.inv;toast('Only '+p.inv+' in stock','requesting '+qty);}p.inv-=qty;p.req+=1;p.reqUnits+=qty;var tm=teamByCode(code);var r={no:p.no,desc:p.desc,code:code,team:tm?tm.country:code,qty:qty,by:actor(),when:0};SPARE_REQUESTS.forEach(function(x){x.when+=0;});SPARE_REQUESTS.unshift(r);logActivity({ic:'box',tone:'info',t:esc(r.team)+' requested '+esc(p.desc),s:p.no+' \u00b7 x'+qty,station:'spares'});toast('Request logged',p.desc+' \u00b7 x'+qty);comboSel.spteam='';comboSel.sppart='';renderSpares();updateNavCounts();}
function paintCatalog(){
 const box=$('spare-catalog');if(!box)return;
 let list=SPARES.slice();
 if(state.spareCat!=='all')list=list.filter(function(p){return p.cat===state.spareCat;});
 const q=state.spareQuery.trim().toLowerCase();
 if(q)list=list.filter(function(p){return p.desc.toLowerCase().indexOf(q)>=0||p.no.toLowerCase().indexOf(q)>=0||p.no.toLowerCase().replace(/-/g,'').indexOf(q.replace(/[-\s]/g,''))>=0||p.cat.toLowerCase().indexOf(q)>=0;});
 let rows=list.map(function(p){var out=p.inv<=0;var cls=out?'stock-pill out':(p.inv<=p.qty?'stock-pill low':'stock-pill');var stk=out?'Out of stock':String(p.inv)+' in stock';return '<tr'+(out?' style="background:#fdf3f2"':'')+'><td class="mono" style="font-size:12px;white-space:nowrap">'+p.no+'</td><td'+(out?' style="color:var(--bad);font-weight:600"':'')+'>'+esc(p.desc)+'</td><td style="color:var(--text-3);font-size:12px">'+esc(p.cat)+'</td><td class="mono" style="text-align:center;color:var(--text-3)">'+p.qty+'</td><td style="text-align:right"><span class="'+cls+'">'+stk+'</span></td></tr>';}).join('');
 if(!rows)rows='<tr><td colspan="5" style="text-align:center;color:var(--text-3);padding:24px">No parts match.</td></tr>';
 box.innerHTML='<table class="ltable"><thead><tr><th>Part number</th><th>Description</th><th>Category</th><th style="text-align:center">Per kit</th><th style="text-align:right">Stock</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function openNewKit(){if(!requireEdit('spares'))return;kitsOpen++;SPARES.forEach(function(p){p.inv+=p.qty;});logActivity({ic:'box',tone:'ok',t:'New kit opened',s:'Kits open: '+kitsOpen,station:'spares'});toast('New kit opened','Now '+kitsOpen+' kits');renderSpares();updateNavCounts();}

/* ===== robot hospital intake ===== */
function openHospIntake(){
 if(!requireEdit('hospital'))return;
 intakeType='Mechanical';intakeLoc='Hospital';comboSel.hiteam='';comboSel.hitech=actor();
 var types=['Mechanical','Software','Machine shop','Other'];
 var typeBtns=types.map(function(t){return '<button class="chip'+(intakeType===t?' on':'')+'" data-action="hosp-type" data-t="'+esc(t)+'">'+esc(t)+'</button>';}).join('');
 var locs=['Hospital','Queueing area','Team\u2019s pit'];
 var locBtns=locs.map(function(l){return '<button class="chip'+(intakeLoc===l?' on':'')+'" data-action="hosp-loc" data-loc="'+esc(l)+'">'+esc(l)+'</button>';}).join('');
 var body='<div class="dsec"><div class="dsec-t">Which team are you helping?</div>'+countryCombo('hiteam','Type a country\u2026')+'</div><div class="dsec"><div class="dsec-t">Location</div><div class="chips">'+locBtns+'</div></div><div class="dsec"><div class="dsec-t">Type of issue</div><div class="chips">'+typeBtns+'</div></div><div class="dsec"><div class="dsec-t">Assigned to</div>'+nameCombo('hitech','Assign a volunteer\u2026')+'<div style="font-size:11px;color:var(--text-3);margin-top:6px">Defaults to you. Clear it to log the team as waiting, or type to assign someone else.</div></div><div class="dsec"><div class="dsec-t">More details</div><textarea class="note-in" id="hi-details" placeholder="What is going on? Add any details, parts tried, symptoms\u2026"></textarea></div>';
 openDrawer('Log a repair',body,'<button class="btn primary" data-action="hosp-create" style="flex:1">'+icon('check')+'Add to Robot Hospital</button>');
}
function createHospTicket(){if(!requireEdit('hospital'))return;var code=comboSel.hiteam;if(!code){toast('Choose a team');return;}var det=(($('hi-details')||{}).value||'').trim();var tm=teamByCode(code);var typed=(($('hitech-in')||{}).value||'').trim();var tech=typed?((comboSel.hitech&&comboSel.hitech.toLowerCase()===typed.toLowerCase())?comboSel.hitech:typed):'';var loc=intakeLoc;var now=Date.now();var st=tech?'In progress':'Waiting';var id='RH'+(245+TICKETS.length);var iss=det||((intakeType==='Other'?'General':intakeType)+' issue reported');var firstLog=tech?(tech+' is helping ('+intakeType.toLowerCase()+')'+(tech!==actor()?' \u00b7 logged by '+actor():'')):('Logged to '+loc.toLowerCase()+', waiting for a tech \u00b7 by '+actor());var t={id:id,code:code,team:tm?tm.country:code,iss:iss,type:intakeType,pri:'normal',st:st,tech:tech||null,loc:loc,open:0,enteredAt:now,waitingSince:now,assignedAt:tech?now:null,doneAt:null,log:[[firstLog,0]]};TICKETS.unshift(t);logActivity({ic:'wrench',tone:'info',t:esc(t.team)+' in the Robot Hospital',s:intakeType+' \u00b7 '+(tech||'waiting at '+loc.toLowerCase()),station:'hospital'});toast('Ticket added',id);closeDrawer();intakeType='Mechanical';intakeLoc='Hospital';renderHospital();updateNavCounts();}

/* ===== flag + name comboboxes ===== */
function countryCombo(prefix,ph){var code=comboSel[prefix]||'';var c=code?COUNTRIES.find(function(x){return x[0]===code;}):null;var label=c?c[1]:'';var fl=code?flag(code,'sm'):'';return '<div style="position:relative"><span id="'+prefix+'-fl" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);display:flex;pointer-events:none;z-index:1">'+fl+'</span><input id="'+prefix+'-in" data-combo="'+prefix+'" data-kind="country" class="lf-in" type="text" autocomplete="off" placeholder="'+ph+'" value="'+esc(label)+'" style="height:44px;padding-left:'+(code?'40px':'13px')+'"><div class="searchpop" id="'+prefix+'-pop"></div></div>';}
function nameCombo(prefix,ph){var nm=comboSel[prefix]||'';var av=nm?miniAv(nm):'';return '<div style="position:relative"><span id="'+prefix+'-fl" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);display:flex;pointer-events:none;z-index:1">'+av+'</span><input id="'+prefix+'-in" data-combo="'+prefix+'" data-kind="name" class="lf-in" type="text" autocomplete="off" placeholder="'+ph+'" value="'+esc(nm)+'" style="height:44px;padding-left:'+(nm?'38px':'13px')+'"><div class="searchpop" id="'+prefix+'-pop"></div></div>';}
function partCombo(prefix,ph){var no=comboSel[prefix]||'';var p=no?SPARES.find(function(x){return x.no===no;}):null;var label=p?p.desc:'';return '<div style="position:relative"><input id="'+prefix+'-in" data-combo="'+prefix+'" data-kind="part" class="lf-in" type="text" autocomplete="off" placeholder="'+ph+'" value="'+esc(label)+'" style="height:44px"><div class="searchpop" id="'+prefix+'-pop"></div></div>';}
function comboFilter(prefix,q){
 var inp=document.getElementById(prefix+'-in');if(!inp)return;
 var kind=inp.getAttribute('data-kind');
 var pop=document.getElementById(prefix+'-pop');if(!pop)return;
 q=String(q).trim().toLowerCase();
 var rows='';
 if(kind==='country'){
  if(!q){pop.classList.remove('on');return;}
  var scored=[];
  COUNTRIES.forEach(function(c){var code=c[0],name=c[1].toLowerCase(),tier=-1;
   if(code===q)tier=0;
   else if(name.indexOf(q)===0)tier=1;
   else if(name.split(/\s+/).some(function(w){return w.indexOf(q)===0;}))tier=2;
   else if(code.indexOf(q)===0)tier=3;
   else if(name.indexOf(q)>=0)tier=4;
   if(tier>=0)scored.push({c:c,t:tier});});
  scored.sort(function(a,b){return a.t-b.t||a.c[1].localeCompare(b.c[1]);});
  scored=scored.slice(0,10);
  rows=scored.length?scored.map(function(s){var c=s.c;return '<div class="combo-row" data-action="combo-pick" data-prefix="'+prefix+'" data-val="'+c[0]+'">'+flag(c[0],'sm')+'<span style="font-size:13px">'+esc(c[1])+'</span></div>';}).join(''):'<div class="sp-empty">No countries found</div>';
  pop.innerHTML=rows;pop.classList.add('on');return;
 }
 if(kind==='part'){
  var nq=q.replace(/[-\s]/g,'');
  var cats=[];SPARES.forEach(function(p){if(cats.indexOf(p.cat)<0)cats.push(p.cat);});
  var any=false;
  cats.forEach(function(cat){
   var matches=SPARES.filter(function(p){if(p.cat!==cat)return false;if(!q)return true;var hay=(p.desc+' '+p.no+' '+p.cat).toLowerCase();return hay.indexOf(q)>=0||hay.replace(/[-\s]/g,'').indexOf(nq)>=0;});
   if(!matches.length)return;any=true;
   rows+='<div class="sp-head">'+esc(cat)+'</div>';
   rows+=matches.map(function(p){var out=p.inv<=0;return '<div class="combo-row" data-action="combo-pick" data-prefix="'+prefix+'" data-val="'+p.no+'"'+(out?' style="opacity:.55"':'')+'><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.desc)+'</div><div class="mono" style="font-size:11px;color:var(--text-3)">'+p.no+'</div></div><span class="'+(out?'stock-pill out':(p.inv<=p.qty?'stock-pill low':'stock-pill'))+'">'+(out?'out':p.inv)+'</span></div>';}).join('');
  });
  if(!any)rows='<div class="sp-empty">No parts found</div>';
  pop.innerHTML=rows;pop.classList.add('on');return;
 }
 var rn=q?NAMES.filter(function(n){return n.toLowerCase().indexOf(q)>=0;}):NAMES.slice();
 rn=rn.slice(0,8);
 rows=rn.length?rn.map(function(n){return '<div class="combo-row" data-action="combo-pick" data-prefix="'+prefix+'" data-val="'+esc(n)+'">'+miniAv(n)+'<span style="font-size:13px">'+esc(n)+'</span></div>';}).join(''):'<div class="sp-empty">No names found</div>';
 pop.innerHTML=rows;pop.classList.add('on');
}
function comboPick(prefix,val){comboSel[prefix]=val;var inp=document.getElementById(prefix+'-in');if(!inp)return;var kind=inp.getAttribute('data-kind');var label=val,fl='';if(kind==='country'){var c=COUNTRIES.find(function(x){return x[0]===val;});label=c?c[1]:val;fl=flag(val,'sm');inp.style.paddingLeft='40px';}else if(kind==='part'){var p=SPARES.find(function(x){return x.no===val;});label=p?p.desc:val;}else{fl=miniAv(val);inp.style.paddingLeft='38px';}inp.value=label;var fh=document.getElementById(prefix+'-fl');if(fh)fh.innerHTML=fl;var pop=document.getElementById(prefix+'-pop');if(pop)pop.classList.remove('on');}

/* ===== help ===== */
function openHelp(){
 var pin='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>';
 var chat='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>';
 var body='<div class="dsec"><div style="font-size:14px;color:var(--text-2)">Stuck on something? Fayez is on site to help. Find him in person, or send a quick message and he will come to you.</div></div><div class="dsec"><div class="help-card"><div class="hc-top"><span class="hc-ic" style="background:#2c6e6a">'+pin+'</span><div><div class="hc-t">Find Fayez walking around</div><div class="hc-s">Roaming the pits and the field</div></div></div><div style="font-size:13px;color:var(--text-2)">Look for the volunteer in the FGC staff shirt near the Robot Hospital and the queueing lanes. Flag him down, or ask any lead to radio for him.</div></div><div class="help-card"><div class="hc-top"><span class="hc-ic" style="background:#3b4655">'+chat+'</span><div><div class="hc-t">Send him a message</div><div class="hc-s">He will read it and come find you</div></div></div><textarea class="note-in" id="help-msg" placeholder="What do you need help with? Where are you?"></textarea></div></div>';
 openDrawer('Need a hand?',body,'<button class="btn primary" data-action="help-send" style="flex:1">'+icon('check')+'Send to Fayez</button>');
}
function sendHelp(){var m=(($('help-msg')||{}).value||'').trim();if(!m){toast('Add a short message first');return;}toast('Sent to Fayez','He will come find you');closeDrawer();}
})();
</script>
