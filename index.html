<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FGC 2026 · Volunteer Operations · Incheon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>
<body>
<div id="login" class="login"></div>

<div id="app" data-station="dashboard">
  <aside class="rail">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="15" fill="#1b3553"/>
          <path d="M20 5v30M5 20h30M9.2 11c4.2 2.7 17.4 2.7 21.6 0M9.2 29c4.2-2.7 17.4-2.7 21.6 0" stroke="#7fa3cf" stroke-width="1.1" opacity=".85"/>
          <ellipse cx="20" cy="20" rx="6.6" ry="15" stroke="#7fa3cf" stroke-width="1.1" opacity=".85"/>
          <path d="M27.4 6.6c.5 2.6 3 3.3 3 6.2 0 2-1.7 3.5-3.5 3.5s-3.3-1.6-3.3-3.6c0-3.1 3.3-2.9 3.8-6.1z" fill="#e8714f"/>
        </svg>
      </div>
      <div class="brand-txt">
        <div class="b1">FIRST Global</div>
        <div class="b2">Volunteer Ops · Incheon&#8217;26</div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="rail-foot">
      <div class="who" id="who"></div>
      <button class="signout" id="rail-signout" data-action="signout" title="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="cmdbar">
      <div class="search">
        <span class="s-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="gsearch" type="text" placeholder="Search teams, countries, pits&#8230;" autocomplete="off">
        <span class="search-kbd">/</span>
        <div class="searchpop" id="searchpop"></div>
      </div>
      <div class="cmd-spacer"></div>
      <div class="eventclock">
        <div class="live-pip"><span class="dot-live"></span><span class="ec-live">LIVE</span></div>
        <div class="ec-sep"></div>
        <div class="ec-day">Day <b>2 &middot; Quals</b></div>
        <div class="ec-clock" id="ec-clock">00:00:00</div>
        <div class="ec-sep"></div>
        <div class="ec-next">Next match<b id="ec-next">&middot;</b></div>
      </div>
      <button class="iconbtn" data-action="help-open" title="Get help from Fayez">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.5"/><path d="M9.4 9.2a2.6 2.6 0 0 1 4.7 1.4c0 1.7-2.1 2-2.1 3.4"/><line x1="12" y1="17.4" x2="12.01" y2="17.4"/></svg>
      </button>
      <button class="iconbtn hide-mob" id="btn-activity" data-action="activity-open" title="Activity log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge-n" id="act-n">0</span>
      </button>
      <div class="usermenu">
        <button class="um-btn" id="um-btn" data-action="usermenu-toggle">
          <span class="avatar" id="um-av" style="width:30px;height:30px;font-size:11px"></span>
          <span class="um-txt"><span class="um-name" id="um-name">&middot;</span><span class="um-role" id="um-role">&middot;</span></span>
          <svg class="um-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="um-pop" id="um-pop"></div>
      </div>
    </div>

    <div class="stage">
      <section class="view" id="view-dashboard"></section>
      <section class="view" id="view-inspections"></section>
      <section class="view" id="view-hospital"></section>
      <section class="view" id="view-spares"></section>
      <section class="view" id="view-queueing"></section>
      <section class="view" id="view-judging"></section>
    </div>
  </main>

  <nav class="botnav" id="botnav"></nav>
</div>

<div class="scrim" id="scrim" data-action="drawer-close"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-h">
    <h3 id="drawer-title">&middot;</h3>
    <button class="iconbtn" data-action="drawer-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-foot" id="drawer-foot"></div>
</aside>

<div class="display" id="display"></div>
<div class="toaster" id="toaster"></div>
 

</body>
</html>
